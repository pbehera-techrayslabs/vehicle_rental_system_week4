<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <link href="/frontend/dist/styles/output.css" rel="stylesheet">
  <script src="/frontend/dist/scripts/admin-login.js" defer></script>
</head>
<body class="bg-blue-950 min-h-screen flex items-center justify-center">
       <my-header class="fixed top-0 left-0 w-full z-10">

       </my-header> 

     

  <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Admin Login</h2>

    <form id="admin-login-form" class="space-y-4">
      <input type="email" id="admin-email" placeholder="Admin Email"
             class="w-full border p-2 rounded" required>

      <input type="password" id="admin-password" placeholder="Admin Password"
             class="w-full border p-2 rounded" required>

      <button type="submit"
              class="w-full bg-gray-800 hover:bg-gray-900 text-white py-2 rounded">
        Login as Admin
      </button>
    </form>

    <p id="msg" class="text-red-500 mt-3 text-center"></p>
  </div>
<script type="module" src="/frontend/dist/components/header.js"></script>
</body>
</html>
